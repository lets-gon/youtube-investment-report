name: YouTube Investment Report

on:
  schedule:
    # 08:50 KST every day. GitHub Actions cron uses UTC.
    - cron: "50 23 * * *"
  workflow_dispatch:

concurrency:
  group: youtube-investment-report-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          WINDOW_HOURS: "24"
          MAX_TRANSCRIPT_CHARS: "12000"
          PROMPT_TRANSCRIPT_CHARS: "5000"
          TRANSCRIPT_LANGUAGES: "ko,en"
        run: python youtube_report.py

      - name: Upload generated data archive
        uses: actions/upload-artifact@v7
        with:
          name: investment-insights-data
          path: out
          if-no-files-found: error
          retention-days: 30
