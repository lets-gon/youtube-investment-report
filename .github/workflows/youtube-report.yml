name: YouTube Investment Report

on:
  schedule:
    # 08:50 KST every day. GitHub Actions cron uses UTC.
    - cron: "50 23 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate and send report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          WINDOW_HOURS: "24"
        run: python youtube_report.py

      - name: Upload generated data archive
        uses: actions/upload-artifact@v7
        with:
          name: investment-insights-data
          path: out
          if-no-files-found: error
          retention-days: 30
